updated_at: "2026-05-28"
notes:
  - resident copy v2 原型已验证：固定 ARM9 resident buffer 会被运行时污染；改为把 resident page 放进 1x2 chunk heap 后，0208913C consumer 可把目标 page 拷入 02283120，82DF miss 后 82A2 命中 page0 图样 73377337；当前单 slot 会在 chunk 0/1 间抖动。
  - chunk miss consumer 原型已验证：0208913C 入口可消费上一轮 miss，更新 020743D4/020743D8 resident slot id；82DF 首次 miss 后 resident_1x2 从 1 翻到 0，后续 82A2 命中 02283160。
  - chunk miss flag 原型已验证：020743C4..020743D0 记录 miss_flag/char/chunk_id/mode；82DF 与 82A2 的 1x2 fallback 会置 miss_flag=1，82CD/82BD resident hit 保持 miss_flag=0。
  - hook 瘦身与同空洞迁移已验证：copy_hook_size 从 0xC0 降到 0xA0，load hook 后移到 02074220，copy 区间获得 0x40 余量；82CD/82DF/82BD 样本保持预期 resident/fallback。
  - 1x1 resident-slot 正例已补充验证：test_vram_font_chunk_table_1x1_probe.nds 中 82BD/R2=0x20 命中 02283040。
  - resident-slot probe 已完成 1x2 运行时验证：resident_1x2_chunk_id=1 时 82CD 命中 resident，82DF/82A2 走 fallback。
  - chunk table probe 暴露新限制：copy_hook_size=0xC0，02074140..02074200 已用满，后续复杂逻辑需迁移或瘦身。
  - chunk table 设计草案已补充：02089190 copy hook 暂不做 NitroFS 缺页加载，先验证 resident slot + fallback 快速决策。
  - chunk_id fallback 原型已完成运行时验证：chunk_id=1 可稳定命中 chunk_base+0x20 fallback，chunk_id=0 仍按 glyph_offset 命中 resident glyph。
  - 下一步围绕 chunk table、按页加载、加载失败 fallback 和 map 查找优化继续推进。
  - 新对话先读取本文件，再读取 current_plan.document 和 current_stage 对应缓存文档。
  - 具体计划使用 Markdown 文档组织；state.yaml 只作为统一恢复入口和当前进度指针。
  - 静态链路和运行时链路均已完成；0208913C -> 0208671C -> 02089190 已动态确认。
  - 第一版 ARM9 空洞 hook 已验证：02089190 跳到 0207411C，R0 可从 06881C00 替换到 ARM9 RAM glyph 后进入 020087BC。
  - 第二版已验证按字符码替换：current_char=82CD 时 R0 可替换到 02074180。
  - no-op 复核显示保存字符 hook 和 copy hook 框架稳定。
  - 原 glyph 副本和 test-pattern 复核显示此前 running=0 不是崩溃证据，可 resume 继续运行。
  - 字符采样工具已新增：tools/sample_vram_font_chars_mcp.py。
  - 多字符小表 probe 已完成双项运行时验证：82CD -> 020741A0，82DF -> 020741E0。
  - 表驱动查找原型已完成运行时验证：82CD -> 02074200，82DF -> 02074240。
  - NitroFS 文件预加载到 RAM 已验证：font/chs_probe.bin -> 02282F40，82CD -> 02282F60，82DF -> 02282FA0。
  - RAM 预加载压力测试已完成：1008K 仍可进入绘制采样，1024K 文本流程失稳，1392K 起 chs_data_ptr=0。
  - 1x1 路径已验证：R2=0x20，源基址 06880000，复用 02089190 -> 020087BC，RAM glyph 替换成功。
  - 方案 A（动态 glyph 缓存）继续推进；下一步把 probe 文件结构升级为 chs_1x1.map/chunk + chs_1x2.map/chunk。
  - 正式 map 不要只按 char_code 命中，需要包含 mode/glyph_size 或拆成 1x1/1x2 两套 map。
  - split-map 原型已完成运行时验证：82A2 在 R2=0x40 时命中 1x2 chunk 02283060，在 R2=0x20 时命中 1x1 chunk 02282FC0。
  - 下一步把 split-map 原型升级为正式格式草案，补 magic/version/header/entry flags，并设计 glyph chunk 分页或分块加载。
  - formal v0 已完成运行时验证：map 使用 CHMP，chunk 使用 CHCK，header_size=0x20，entry_size=0x10；82A2 在 R2=0x40 时命中 02283100，在 R2=0x20 时命中 02283000。
  - 下一步围绕 chunk_id、chunk table、缺字 fallback 和 map 查找性能设计分页/分块方案。
  - 不要使用 overlay_0000 尾部追加方案，它会踩 overlay_0000 BSS。
