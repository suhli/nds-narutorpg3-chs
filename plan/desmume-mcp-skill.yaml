decisions:
  - 使用仓库内 tools/desmume.exe。
  - 使用 tools/desmume.exe --mcp 从命令行启动模拟器并提供 HTTP MCP server。
  - HTTP MCP 地址为 http://127.0.0.1:8765/，使用 JSON-RPC POST 调用。
  - 不使用 rom/origin.nds 作为修改输出；模拟器验证优先加载新打包 ROM 或临时测试 ROM。
